[tool:pytest]
cov = 1
testpaths = tests.py
python_classes = *Test,*Tests
python_functions = test_*
norecursedirs =
    venv
    .git
    dist
    build
    docs
    migrations
    examples
addopts =
    --tb=native
    --cov=.
    --cov-report=term-missing

[coverage:run]
omit =
    venv/*
    .git/*
    dist/*
    build/*
    docs/*
    */migrations/*
    examples/*
    tests/*
    */tests*

[coverage:report]
fail_under = 85
omit =
    venv/*
    .git/*
    dist/*
    build/*
    docs/*
    */migrations/*
    examples/*
    tests/*
    */tests*

[flake8]
jobs = 1
max-line-length = 120
exclude = venv,.git/*,dist/*,build/*,docs/*
